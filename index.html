<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منظومة القيادة - التحكم المركزي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b132b; color: #fff; margin: 0; padding: 20px; }
        .control-panel { max-width: 900px; margin: 0 auto; background: #1c2541; padding: 25px; border-radius: 8px; border-top: 4px solid #d4af37; }
        .btn { padding: 12px 18px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: #fff; margin: 5px; transition: 0.3s; }
        textarea { width: 100%; height: 120px; background: #0b132b; color: #fff; border: 1px solid #3a506b; padding: 15px; margin-top: 10px; }
        #status-msg { text-align: center; margin-top: 15px; font-weight: bold; color: #d4af37; }
    </style>
</head>
<body>

<div class="control-panel">
    <h2>التحكم المركزي</h2>
    <button class="btn" style="background:#3498db;" onclick="fetchData()">📥 سحب البيانات</button>
    <button class="btn" style="background:#27ae60;" onclick="generateReliablePDF()">⬇️ تصدير PDF سريع</button>
    <textarea id="missions" placeholder="المهام..."></textarea>
    <textarea id="movements" placeholder="التحركات..."></textarea>
    <div id="status-msg">جاهز.</div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwXrjPyVzj_z-wIHEYEbhaKRb2wTxbZoNwF5Uw9OkbOA0r_XALUlnYD6Vm0a9Mq9Cy0/exec"; 
    const KEY = "Marib_Cipher_2026_!@#";

    async function fetchData() {
        const msg = document.getElementById('status-msg');
        try {
            const res = await fetch(`${GAS_URL}?action=get_data`);
            const data = await res.json();
            let m = "", mv = "";
            data.forEach(r => {
                const dec = JSON.parse(CryptoJS.AES.decrypt(r.encryptedPayload, KEY).toString(CryptoJS.enc.Utf8));
                m += dec.missions + "\n";
                mv += dec.movements + "\n";
            });
            document.getElementById('missions').value = m;
            document.getElementById('movements').value = mv;
            msg.innerText = "تم سحب البيانات بنجاح.";
        } catch(e) { msg.innerText = "خطأ في السحب."; }
    }

    // إضافة الخطوط العربية لـ PDFMake
    pdfMake.fonts = {
        Arial: { normal: 'https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.66/fonts/Roboto/Roboto-Regular.ttf', bold: 'https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.66/fonts/Roboto/Roboto-Medium.ttf' }
    };

    function generateReliablePDF() {
        const docDefinition = {
            pageSize: 'A4',
            pageMargins: [40, 40, 40, 40],
            content: [
                {
                    table: {
                        widths: ['*', 'auto', '*'],
                        body: [
                            [
                                { stack: [
                                    { image: 'logoR', width: 150 },
                                    { text: 'المنطقة العسكرية السادسة\nشعبة الرعاية الاجتماعية', style: 'headerSub' }
                                ], alignment: 'center' },
                                { stack: [
                                    { text: 'بسم الله الرحمن الرحيم', style: 'basmalah' },
                                    { image: 'logoC', width: 100 },
                                    { text: 'سري جداً', style: 'secret' }
                                ], alignment: 'center' },
                                { text: 'الرقم: (     )\nالتاريخ: ' + new Date().toLocaleDateString(), alignment: 'left', bold: true }
                            ]
                        ]
                    }, layout: 'noBorders'
                },
                { canvas: [{ type: 'line', x1: 0, y1: 5, x2: 520, y2: 5, lineWidth: 2 }] },
                { text: 'تقرير الموقف اليومي', style: 'title' },
                { text: 'المهام المنفذة:', style: 'subTitle' },
                { text: document.getElementById('missions').value, style: 'content' },
                { text: 'التحركات والزيارات:', style: 'subTitle' },
                { text: document.getElementById('movements').value, style: 'content' }
            ],
            images: {
                logoR: 'https://lh3.googleusercontent.com/d/1y3bTDxMFwU0zGI-0XJOK070CIQxOuLHI',
                logoC: 'https://lh3.googleusercontent.com/d/1Hdpr5cf2Z0bCLO6qLYsWxBikD_miplSh'
            },
            styles: {
                headerSub: { fontSize: 12, bold: true, margin: [0, 5, 0, 0] },
                basmalah: { fontSize: 16, bold: true, margin: [0, 0, 0, 5] },
                secret: { fontSize: 10, color: 'red', decoration: 'underline' },
                title: { fontSize: 16, bold: true, alignment: 'center', margin: [0, 20, 0, 20] },
                subTitle: { fontSize: 14, bold: true, decoration: 'underline', margin: [0, 10, 0, 5] },
                content: { fontSize: 12, margin: [0, 5, 0, 10] }
            },
            defaultStyle: { font: 'Arial' }
        };
        pdfMake.createPdf(docDefinition).download('تقرير_الموقف.pdf');
    }
</script>
</body>
</html>
