<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة القيادة - التحكم المركزي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background: #0c0f14; color: #fff; margin: 0; padding: 20px; }
        .control-panel { max-width: 800px; margin: 0 auto; background: #1a1e26; padding: 25px; border-radius: 10px; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        h2 { color: #d4af37; text-align: center; }
        .btn { padding: 12px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin: 5px; color: #fff; transition: 0.3s; width: 100%; max-width: 250px; }
        .btn:hover { opacity: 0.9; }
        textarea { width: 100%; height: 120px; background: #000; color: #fff; border: 1px solid #444; padding: 15px; margin-top: 10px; border-radius: 5px; box-sizing: border-box; }
        #official-report { display: none; background: white; color: black; padding: 40px; width: 210mm; margin: 20px auto; min-height: 297mm; }
        #status-msg { margin-top: 15px; font-weight: bold; color: #d4af37; text-align: center; }
    </style>
</head>
<body>

<div class="control-panel" id="login-screen">
    <h2>غرفة القيادة العليا</h2>
    <input type="text" id="username" placeholder="اسم المستخدم" style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;">
    <input type="password" id="password" placeholder="كلمة المرور" style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;">
    <button class="btn" style="background:#d4af37; width:100%;" onclick="login()">دخول إلى المنظومة</button>
</div>

<div class="control-panel" id="admin-panel" style="display:none;">
    <h2>لوحة التحكم والسيطرة</h2>
    <div style="text-align:center;">
        <button class="btn" style="background:#3498db;" onclick="fetchData()">📥 سحب الموقف اليومي</button>
        <button class="btn" style="background:#e74c3c;" onclick="generatePDF()">📄 اعتماد وتصدير PDF</button>
    </div>
    <textarea id="missions" placeholder="المهام والمنجزات..."></textarea>
    <textarea id="movements" placeholder="التحركات والزيارات..."></textarea>
    <div id="status-msg"></div>
</div>

<!-- التقرير الرسمي للطباعة -->
<div id="official-report">
    <div id="report-content" style="text-align:right;">
        <h1 style="text-align:center;">تقرير الموقف اليومي</h1>
        <hr>
        <h3>المهام والمنجزات:</h3>
        <p id="pdf-missions"></p>
        <h3>التحركات والزيارات:</h3>
        <p id="pdf-movements"></p>
        <br><br>
        <p style="text-align:left; font-weight:bold;">رئيس شعبة الرعاية الاجتماعية</p>
    </div>
</div>

<script>
    // ⚠️ ضع رابط جوجل الخاص بك هنا بدقة
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwXrjPyVzj_z-wIHEYEbhaKRb2wTxbZoNwF5Uw9OkbOA0r_XALUlnYD6Vm0a9Mq9Cy0/exec"; 
    const KEY = "Marib_Cipher_2026_!@#";

    async function login() {
        try {
            const res = await fetch(`${GAS_URL}?action=login&username=${document.getElementById('username').value}&password=${document.getElementById('password').value}`);
            const data = await res.json();
            if(data.status === "success") {
                document.getElementById('login-screen').style.display = "none";
                document.getElementById('admin-panel').style.display = "block";
            } else { alert("بيانات الدخول غير صحيحة"); }
        } catch(e) { alert("خطأ في الاتصال بالخادم"); }
    }

    async function fetchData() {
        document.getElementById('status-msg').innerText = "جاري جلب البيانات من السحابة...";
        try {
            const res = await fetch(`${GAS_URL}?action=get_data`);
            const data = await res.json();
            let cMissions = "", cMovements = "", count = 0;
            const today = new Date().toDateString();
            
            data.forEach(row => {
                try {
                    const decrypted = CryptoJS.AES.decrypt(row.encryptedPayload, KEY).toString(CryptoJS.enc.Utf8);
                    const report = JSON.parse(decrypted);
                    if(new Date(report.date).toDateString() === today) {
                        count++;
                        cMissions += "[" + row.departmentId + "]: " + report.missions + "\n";
                        cMovements += "[" + row.departmentId + "]: " + report.movements + "\n";
                    }
                } catch(e) {}
            });
            
            document.getElementById('missions').value = cMissions;
            document.getElementById('movements').value = cMovements;
            document.getElementById('status-msg').innerText = count > 0 ? "تم سحب " + count + " تقارير ليومنا هذا." : "لا توجد تقارير بتاريخ اليوم.";
        } catch(e) { document.getElementById('status-msg').innerText = "خطأ في السحب."; }
    }

    function generatePDF() {
        const element = document.getElementById('official-report');
        document.getElementById('pdf-missions').innerText = document.getElementById('missions').value;
        document.getElementById('pdf-movements').innerText = document.getElementById('movements').value;
        
        element.style.display = "block";
        html2pdf().from(element).set({
            margin: 15,
            filename: 'التقرير_اليومي.pdf',
            html2canvas: { scale: 2 }
        }).save().then(() => {
            element.style.display = "none";
        });
    }
</script>
</body>
</html>
